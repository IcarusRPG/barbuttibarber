<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbutti Barbearia • Página Inicial Demo</title>
  <style>
    :root{--bg:#0d0f14;--surface:#151922;--surface-2:#1b2130;--text:#f8f4ea;--muted:#b7ad9b;--gold:#d4af62;--gold-2:#a58043;--ok:#67c08d;--warn:#e6ba72;--danger:#dd7f7f;--radius:14px;--border:1px solid rgba(212,175,98,.18);--shadow:0 16px 40px rgba(0,0,0,.35)}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:Inter,Segoe UI,Roboto,sans-serif;background:radial-gradient(1200px 500px at 20% -10%,rgba(212,175,98,.25),transparent),var(--bg);color:var(--text)}
    .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}.sidebar{padding:1.3rem;border-right:var(--border);background:linear-gradient(180deg,#10141d,#0d0f14)}
    .brand{display:flex;gap:.9rem;align-items:center;margin-bottom:1.4rem}.logo{width:68px;height:68px;border-radius:16px;background:linear-gradient(140deg,var(--gold-2),var(--gold));box-shadow:0 12px 26px rgba(212,175,98,.35)}
    .brand h1{font-size:1.18rem}.brand p{font-size:.84rem;color:var(--muted)}
    .menu button{width:100%;text-align:left;border:none;background:transparent;color:var(--muted);padding:.75rem .9rem;border-radius:10px;cursor:pointer;margin:.2rem 0;transition:all .24s ease;position:relative}
    .menu button.active,.menu button:hover{background:rgba(212,175,98,.14);color:var(--text);transform:translateX(4px)}
    [data-tooltip]{position:relative}[data-tooltip]::after{content:attr(data-tooltip);position:absolute;left:102%;top:50%;transform:translateY(-50%) scale(.96);background:#0b0d12;color:var(--text);padding:.25rem .5rem;border-radius:6px;border:var(--border);font-size:.72rem;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}
    [data-tooltip]:hover::after{opacity:1;transform:translateY(-50%) scale(1)}
    .content{padding:1.2rem}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}.badge{border:var(--border);padding:.25rem .6rem;border-radius:999px;color:var(--gold);font-size:.75rem}
    .hero{background:linear-gradient(120deg,rgba(212,175,98,.24),rgba(255,255,255,.04));border:var(--border);padding:1rem;border-radius:var(--radius);margin-bottom:1rem;display:flex;justify-content:space-between;gap:1rem;align-items:center}.hero img{width:180px;height:110px;object-fit:cover;border-radius:12px;border:var(--border)}
    .grid{display:grid;gap:1rem}.grid.kpi{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1rem}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .card{background:linear-gradient(165deg,rgba(255,255,255,.025),transparent),var(--surface);border:var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem}
    .k{padding:.9rem;border:var(--border);border-radius:12px;background:var(--surface-2)} .k b{font-size:1.45rem;display:block;margin-top:.3rem}
    .view{display:none}.view.active{display:block}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:.6rem;text-align:left;border-bottom:1px solid rgba(212,175,98,.1);font-size:.9rem}
    .tag{padding:.18rem .55rem;border-radius:999px;font-size:.72rem}.ok{background:rgba(103,192,141,.15);color:var(--ok)}.warn{background:rgba(230,186,114,.15);color:var(--warn)}.danger{background:rgba(221,127,127,.15);color:var(--danger)}
    .form{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.6rem;margin-bottom:.8rem}.input,select{width:100%;background:#11151d;border:var(--border);border-radius:10px;padding:.55rem .65rem;color:var(--text)}
    .btn{padding:.5rem .8rem;border-radius:10px;border:var(--border);background:var(--surface-2);color:var(--text);cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-1px)}.btn.primary{background:linear-gradient(120deg,var(--gold-2),var(--gold));border:none;color:#14161c;font-weight:700}
    .list{display:flex;flex-direction:column;gap:.55rem}.item{padding:.7rem;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;gap:.8rem;cursor:pointer;transition:.2s}.item:hover{transform:translateX(4px);border-color:rgba(212,175,98,.35)}
    .split{display:grid;grid-template-columns:340px 1fr;gap:1rem}
    .overlay{position:fixed;inset:0;background:rgba(8,9,12,.86);backdrop-filter:blur(3px);display:none;z-index:20;padding:2rem}.overlay.open{display:block;animation:fadeIn .24s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}} .exploded{max-width:980px;margin:auto;background:var(--surface);border:var(--border);border-radius:16px;padding:1rem;box-shadow:var(--shadow)}
    .exploded .messages{min-height:340px;max-height:55vh;overflow:auto;margin:.8rem 0;display:flex;flex-direction:column;gap:.5rem}.msg{padding:.55rem .7rem;border-radius:10px;max-width:70%}.msg.bot{background:rgba(230,186,114,.15)}.msg.human{background:rgba(103,192,141,.15);margin-left:auto}
    @media (max-width:1120px){.grid.kpi{grid-template-columns:repeat(2,1fr)}.grid.two,.split,.form{grid-template-columns:1fr}}@media (max-width:860px){.app{grid-template-columns:1fr}.sidebar{position:sticky;top:0;z-index:2}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo"></div><div><h1>Barbutti Barbearia</h1><p>SaaS Premium • Demo navegável</p></div></div>
    <nav class="menu" id="menu"></nav>
  </aside>
  <main class="content">
    <header class="topbar"><div><h2 id="title">Dashboard</h2><p style="color:var(--muted)">Frontend desacoplado pronto para n8n/webhooks</p></div><span class="badge">Mock completo</span></header>
    <section class="hero"><div><h3 style="margin-bottom:.35rem">Experiência sofisticada e comercial</h3><p style="color:var(--muted)">Com CRUD mockado e módulo de conversas maximizável.</p></div><img src="https://res.cloudinary.com/dk6okgt0a/image/upload/v1776542449/WhatsApp_Image_2026-04-17_at_21.09.05_sgbuvm.jpg" alt="Referência visual"/></section>
    <section id="dashboard" class="view active"></section><section id="agenda" class="view"></section><section id="clientes" class="view"></section><section id="barbeiros" class="view"></section><section id="servicos" class="view"></section><section id="conversas" class="view"></section><section id="configuracoes" class="view"></section><section id="agendamento-publico" class="view"></section>
  </main>
</div>
<div class="overlay" id="chatOverlay"><div class="exploded"><div style="display:flex;justify-content:space-between;gap:.6rem;align-items:center"><h3 id="chatTitle">Conversa</h3><div><button class="btn" id="prevChat">◀</button> <button class="btn" id="nextChat">▶</button> <button class="btn" id="closeChat">Fechar</button></div></div><div class="messages" id="chatMessages"></div><div style="display:flex;gap:.6rem"><input id="chatInput" class="input" placeholder="Digite uma mensagem mock..."/><button class="btn primary" id="sendChat">Enviar</button></div></div></div>
<script>
const state={
  views:[['dashboard','Dashboard','KPIs e desempenho'],['agenda','Agenda','Visualização diária/semanal/mensal'],['clientes','Clientes','CRUD de clientes'],['barbeiros','Barbeiros','CRUD da equipe'],['servicos','Serviços','CRUD de serviços'],['conversas','Conversas','Clique para expandir'],['configuracoes','Configurações','Personalização da marca'],['agendamento-publico','Agendamento Público','Fluxo externo simulado']],
  kpis:[['Agendamentos hoje','32','+11%'],['Taxa ocupação','87%','Meta 85%'],['Cancelamentos','3','-14%'],['No-show','2','-33%']],
  agenda:[{hora:'09:00',barbeiro:'André Costa',cliente:'Lucas Mendes',status:'confirmado'},{hora:'09:45',barbeiro:'Caio Lima',cliente:'Rafael Souza',status:'aguardando'}],
  clientes:[{nome:'Lucas Mendes',whats:'(62) 99911-2211',ultimo:'17/04/2026',barbeiro:'André Costa'},{nome:'Rafael Souza',whats:'(62) 99870-8899',ultimo:'15/04/2026',barbeiro:'Caio Lima'}],
  barbeiros:[{nome:'André Costa',esp:'Corte premium, barba clássica',status:'ativo',cor:'#D4AF62'},{nome:'Caio Lima',esp:'Degradê, visagismo',status:'ativo',cor:'#6DC4D8'}],
  servicos:[{nome:'Corte Premium',dur:'45 min',preco:'R$ 85',cat:'Cabelo'},{nome:'Barba Terapia',dur:'30 min',preco:'R$ 65',cat:'Barba'}],
  conversas:[{cliente:'Lucas Mendes',tipo:'humano',ultima:'Pode remarcar para 19h?',horario:'19/04 18:05',mensagens:[['bot','Olá, posso ajudar com seu agendamento?'],['human','Pode remarcar para 19h?']]},{cliente:'Rafael Souza',tipo:'bot',ultima:'Seu horário está confirmado ✅',horario:'19/04 17:42',mensagens:[['bot','Seu horário está confirmado ✅'],['human','Perfeito, obrigado!']]}],
  chatIndex:0
};
const menu=document.getElementById('menu'),title=document.getElementById('title');
state.views.forEach(([id,label,tip],idx)=>{const b=document.createElement('button');b.textContent=label;b.dataset.view=id;b.dataset.tooltip=tip;if(!idx)b.classList.add('active');b.onclick=()=>activate(id,label,b);menu.appendChild(b);});
function activate(id,label,button){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));button.classList.add('active');title.textContent=label;render();}
const tag=s=>`<span class="tag ${s.includes('confirm')||s.includes('conclu')||s==='ativo'?'ok':s.includes('aguard')?'warn':'danger'}">${s}</span>`;
const btn=(txt,fn,cls='btn')=>`<button class="${cls}" onclick="${fn}">${txt}</button>`;

function crudSection(title,fields,dataKey,headers){
  const form=`<div class="form">${fields.map(f=>`<input class="input" id="${dataKey}_${f.key}" placeholder="${f.label}"/>`).join('')}<button class="btn primary" onclick="addItem('${dataKey}')">Adicionar</button></div>`;
  const rows=state[dataKey].map((r,i)=>`<tr>${fields.map(f=>`<td>${r[f.key]}</td>`).join('')}<td>${btn('Editar',`editItem('${dataKey}',${i})`)} ${btn('Excluir',`deleteItem('${dataKey}',${i})`)}</td></tr>`).join('');
  return `<article class="card"><h3 style="margin-bottom:.7rem">${title}</h3>${form}<table class="table"><tr>${headers.map(h=>`<th>${h}</th>`).join('')}<th>Ações</th></tr>${rows}</table></article>`;
}

window.addItem=function(key){
  const map={clientes:['nome','whats','ultimo','barbeiro'],barbeiros:['nome','esp','status','cor'],servicos:['nome','dur','preco','cat'],agenda:['hora','barbeiro','cliente','status']};
  const obj={}; map[key].forEach(k=>obj[k]=document.getElementById(`${key}_${k}`)?.value||'');
  if(Object.values(obj).some(v=>!v.trim())) return alert('Preencha todos os campos.');
  state[key].push(obj); render();
};
window.editItem=function(key,index){
  const item=state[key][index]; Object.keys(item).forEach(k=>{const v=prompt(`Editar ${k}:`,item[k]); if(v!==null)item[k]=v;}); render();
};
window.deleteItem=function(key,index){if(confirm('Excluir registro?')){state[key].splice(index,1); render();}};

function render(){
  document.getElementById('dashboard').innerHTML=`<div class="grid kpi">${state.kpis.map(k=>`<article class="k"><small style="color:var(--muted)">${k[0]}</small><b>${k[1]}</b><small style="color:var(--gold)">${k[2]}</small></article>`).join('')}</div><div class="grid two"><article class="card"><h3 style="margin-bottom:.7rem">Próximos atendimentos</h3>${state.agenda.map(a=>`<div class="item" style="cursor:default"><span>${a.hora} • ${a.cliente} • ${a.barbeiro}</span>${tag(a.status)}</div>`).join('')}</article><article class="card"><h3 style="margin-bottom:.7rem">Desempenho por barbeiro</h3><div class="item" style="cursor:default"><span>André Costa</span><b>R$ 1.240</b></div><div class="item" style="cursor:default"><span>Caio Lima</span><b>R$ 980</b></div></article></div>`;
  document.getElementById('agenda').innerHTML=crudSection('Agenda (CRUD)',[{key:'hora',label:'Hora'},{key:'barbeiro',label:'Barbeiro'},{key:'cliente',label:'Cliente'},{key:'status',label:'Status'}],'agenda',['Hora','Barbeiro','Cliente','Status']);
  document.getElementById('clientes').innerHTML=crudSection('Clientes (CRUD)',[{key:'nome',label:'Nome'},{key:'whats',label:'WhatsApp'},{key:'ultimo',label:'Último atendimento'},{key:'barbeiro',label:'Último barbeiro'}],'clientes',['Nome','WhatsApp','Último','Barbeiro']);
  document.getElementById('barbeiros').innerHTML=crudSection('Barbeiros (CRUD)',[{key:'nome',label:'Nome'},{key:'esp',label:'Especialidades'},{key:'status',label:'Status'},{key:'cor',label:'Cor'}],'barbeiros',['Nome','Especialidades','Status','Cor']);
  document.getElementById('servicos').innerHTML=crudSection('Serviços (CRUD)',[{key:'nome',label:'Serviço'},{key:'dur',label:'Duração'},{key:'preco',label:'Preço'},{key:'cat',label:'Categoria'}],'servicos',['Serviço','Duração','Preço','Categoria']);
  document.getElementById('conversas').innerHTML=`<article class="card"><h3 style="margin-bottom:.7rem">Conversas (clique para expandir)</h3><div class="split"><div class="list">${state.conversas.map((c,i)=>`<div class="item" onclick="openChat(${i})"><div><b>${c.cliente}</b><p style="color:var(--muted)">${c.ultima}</p></div><div style="text-align:right">${tag(c.tipo)}<p style="color:var(--muted)">${c.horario}</p></div></div>`).join('')}</div><div class="card"><p style="color:var(--muted)">Selecione uma conversa para abrir em tela maximizada (“explodir”) e navegar entre anterior/próxima.</p></div></div></article>`;
  document.getElementById('configuracoes').innerHTML=`<article class="card"><h3 style="margin-bottom:.7rem">Configurações da marca</h3><div class="form"><input class="input" value="Barbutti Barbearia"/><input class="input" value="RGB Primária: 212,175,98"/><input class="input" value="RGB Secundária: 140,109,63"/><input class="input" value="Logo/Favicon URL"/><button class="btn primary">Salvar tema</button></div></article>`;
  document.getElementById('agendamento-publico').innerHTML=`<article class="card"><h3 style="margin-bottom:.7rem">Agendamento público (simulado)</h3><div class="form"><input class="input" value="André Costa"/><input class="input" value="Corte Premium"/><input class="input" type="date" value="2026-04-22"/><input class="input" value="18:30"/><button class="btn">Cancelar</button><button class="btn primary">Confirmar agendamento</button></div></article>`;
}

const overlay=document.getElementById('chatOverlay');
window.openChat=function(i){state.chatIndex=i;renderChat();overlay.classList.add('open');};
function renderChat(){const c=state.conversas[state.chatIndex];document.getElementById('chatTitle').textContent=`${c.cliente} • ${state.chatIndex+1}/${state.conversas.length}`;document.getElementById('chatMessages').innerHTML=c.mensagens.map(m=>`<div class="msg ${m[0]}">${m[1]}</div>`).join('');}
function stepChat(delta){state.chatIndex=(state.chatIndex+delta+state.conversas.length)%state.conversas.length;renderChat();}
document.getElementById('closeChat').onclick=()=>overlay.classList.remove('open');document.getElementById('prevChat').onclick=()=>stepChat(-1);document.getElementById('nextChat').onclick=()=>stepChat(1);
document.getElementById('sendChat').onclick=()=>{const input=document.getElementById('chatInput');if(!input.value.trim())return;state.conversas[state.chatIndex].mensagens.push(['human',input.value.trim()]);state.conversas[state.chatIndex].ultima=input.value.trim();input.value='';renderChat();render();};
render();
</script>
</body>
</html>
