<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbutti App Mobile • Demo</title>
  <style>
    :root{--bg:#0b0d12;--surface:#121722;--surface-2:#1a2130;--text:#f4efe4;--muted:#a89f90;--gold:#d4af62;--gold2:#9c7a44;--ok:#57bf8a;--warn:#ebc07a;--danger:#df8080;--border:1px solid rgba(212,175,98,.22)}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui;background:var(--bg);color:var(--text)}
    .phone{max-width:460px;margin:0 auto;min-height:100vh;border-left:var(--border);border-right:var(--border);padding:1rem 1rem 6rem;background:radial-gradient(700px 200px at 20% -10%,rgba(212,175,98,.2),transparent),var(--bg)}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}.badge{padding:.2rem .55rem;border-radius:999px;background:rgba(212,175,98,.18);color:var(--gold);font-size:.72rem}
    .card{background:var(--surface);border:var(--border);border-radius:16px;padding:1rem;margin-bottom:.8rem}.muted{color:var(--muted)}
    .kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}.k{background:var(--surface-2);border:var(--border);border-radius:12px;padding:.8rem}
    .list{display:flex;flex-direction:column;gap:.5rem}.item{display:flex;justify-content:space-between;gap:.5rem;padding:.65rem;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)}
    .tag{padding:.15rem .5rem;border-radius:999px;font-size:.72rem}.ok{background:rgba(87,191,138,.15);color:var(--ok)}.warn{background:rgba(235,192,122,.15);color:var(--warn)}
    .table-wrap{overflow:auto}.table{width:100%;min-width:540px;border-collapse:collapse}.table th,.table td{padding:.56rem;border-bottom:1px solid rgba(212,175,98,.12);text-align:left}
    .form{display:grid;gap:.55rem}.input{width:100%;background:#0f141e;border:var(--border);border-radius:10px;padding:.65rem .7rem;color:var(--text)}.btn{padding:.62rem .75rem;border-radius:10px;border:var(--border);background:var(--surface-2);color:var(--text)}.btnp{background:linear-gradient(120deg,var(--gold2),var(--gold));color:#111;border:none}
    .view{display:none}.view.active{display:block}
    .tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:0;max-width:460px;width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:.3rem;padding:.5rem .5rem calc(.6rem + env(safe-area-inset-bottom));background:#0e121a;border-top:var(--border)}
    .tabs button{background:transparent;border:none;color:var(--muted);padding:.48rem .2rem;border-radius:9px;font-size:.68rem}.tabs button.active{background:rgba(212,175,98,.12);color:var(--text)}
  </style>
</head>
<body>
  <div class="phone">
    <header class="top"><div><h2>Barbutti App</h2><p class="muted">Gestão mobile-first</p></div><span class="badge">Demo</span></header>
    <section id="dashboard" class="view active"></section>
    <section id="agenda" class="view"></section>
    <section id="clientes" class="view"></section>
    <section id="barbeiros" class="view"></section>
    <section id="servicos" class="view"></section>
    <section id="conversas" class="view"></section>
    <section id="config" class="view"></section>
    <section id="publico" class="view"></section>
  </div>
  <nav class="tabs" id="tabs"></nav>
<script>
const state={
 tabs:[['dashboard','🏠 Início'],['agenda','📅 Agenda'],['clientes','👤 Clientes'],['barbeiros','✂️ Equipe'],['servicos','🧾 Serviços'],['conversas','💬 Chats'],['config','⚙️ Ajustes'],['publico','🌐 Público']],
 agenda:[['09:00','André','Lucas','confirmado'],['09:45','Caio','Rafael','aguardando']],
 clientes:[['Lucas Mendes','(62) 99911-2211'],['Rafael Souza','(62) 99870-8899']],
 barbeiros:[['André Costa','Corte premium'],['Caio Lima','Degradê e visagismo']],
 servicos:[['Corte Premium','R$ 85'],['Barba Terapia','R$ 65']],
 conversas:[['Lucas','Pode remarcar para 19h?'],['Rafael','Confirmado ✅']]
};
const tabsEl=document.getElementById('tabs');
state.tabs.forEach(([id,label],i)=>{const b=document.createElement('button');b.textContent=label;if(i===0)b.classList.add('active');b.onclick=()=>openTab(id,b);tabsEl.appendChild(b);});
function openTab(id,btn){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
const tag=s=>`<span class="tag ${s==='confirmado'?'ok':'warn'}">${s}</span>`;
document.getElementById('dashboard').innerHTML=`<div class='card'><h3>Resumo do dia</h3><p class='muted'>Visual pensado para celular.</p><div class='kpi'><div class='k'><small class='muted'>Agendamentos</small><h2>32</h2></div><div class='k'><small class='muted'>Ocupação</small><h2>87%</h2></div><div class='k'><small class='muted'>No-show</small><h2>2</h2></div><div class='k'><small class='muted'>Faturamento</small><h2>R$3.480</h2></div></div></div>`;
document.getElementById('agenda').innerHTML=`<div class='card'><h3>Agenda</h3><div class='table-wrap'><table class='table'><tr><th>Hora</th><th>Barbeiro</th><th>Cliente</th><th>Status</th></tr>${state.agenda.map(a=>`<tr><td>${a[0]}</td><td>${a[1]}</td><td>${a[2]}</td><td>${tag(a[3])}</td></tr>`).join('')}</table></div></div>`;
document.getElementById('clientes').innerHTML=`<div class='card'><h3>Clientes</h3><div class='list'>${state.clientes.map(c=>`<div class='item'><span>${c[0]}</span><small>${c[1]}</small></div>`).join('')}</div></div>`;
document.getElementById('barbeiros').innerHTML=`<div class='card'><h3>Equipe</h3><div class='list'>${state.barbeiros.map(c=>`<div class='item'><span>${c[0]}</span><small>${c[1]}</small></div>`).join('')}</div></div>`;
document.getElementById('servicos').innerHTML=`<div class='card'><h3>Serviços</h3><div class='list'>${state.servicos.map(c=>`<div class='item'><span>${c[0]}</span><small>${c[1]}</small></div>`).join('')}</div></div>`;
document.getElementById('conversas').innerHTML=`<div class='card'><h3>Conversas</h3><div class='list'>${state.conversas.map(c=>`<div class='item'><span>${c[0]}</span><small>${c[1]}</small></div>`).join('')}</div></div>`;
document.getElementById('config').innerHTML=`<div class='card'><h3>Ajustes</h3><div class='form'><input class='input' value='Barbutti Barbearia'><input class='input' value='RGB: 212,175,98'><button class='btn btnp'>Salvar tema</button></div></div>`;
document.getElementById('publico').innerHTML=`<div class='card'><h3>Agendamento Público</h3><div class='form'><input class='input' value='André Costa'><input class='input' value='Corte Premium'><input class='input' type='date' value='2026-04-29'><button class='btn btnp'>Confirmar</button></div></div>`;
</script>
</body>
</html>
