<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login • Barbutti</title>
<link rel="stylesheet" href="/css/reset.css"><link rel="stylesheet" href="/css/variables.css"><link rel="stylesheet" href="/css/global.css"><link rel="stylesheet" href="/css/pages/login.css"></head>
<body class="page-login" style="display:grid;place-items:center;min-height:100vh;padding:1rem">
  <main class="card" style="width:min(430px,100%)">
    <div class="brand" style="margin-bottom:1rem"><div class="brand-mark"></div><div><strong>Barbutti Barbearia</strong><p>Gestão premium</p></div></div>
    <h1 class="hero-title">Bem-vindo de volta</h1>
    <p style="margin-bottom:1rem">Primeiro acesso demo: <strong>adminicarus</strong> / <strong>Icarus#Goias!123</strong>.</p>
    <form id="login-form" class="grid" style="gap:.7rem"><input class="input" name="username" placeholder="Usuário"><input class="input" name="password" placeholder="Senha" type="password"><button class="btn btn-primary" type="submit">Entrar</button><p id="login-msg"></p></form>
  </main>
  <script type="module">
    import { login } from '/js/auth.js';
    document.getElementById('login-form').addEventListener('submit',(e)=>{e.preventDefault(); const data=new FormData(e.target); try{const s=login(data.get('username'),data.get('password')); if(s.mustChangePassword) alert('Troca de senha obrigatória no primeiro acesso (mock).'); location.href='/pages/dashboard.html';}catch(err){document.getElementById('login-msg').textContent=err.message;}})
  </script>
</body></html>
